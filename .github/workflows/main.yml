class TelaInicio extends StatelessWidget {
  const TelaInicio({super.key});

  Future<void> _adicionarAoCarrinho(BuildContext context, Map<String, dynamic> produtoData) async {
    final User? usuarioLogado = FirebaseAuth.instance.currentUser;

    if (usuarioLogado == null) {
      ScaffoldMessenger.of(context).showSnackBar(
        const SnackBar(content: Text("Você precisa estar logado para adicionar itens ao carrinho!"))
      );
      return;
    }

    try {
      await FirebaseFirestore.instance
          .collection('usuarios')
          .doc(usuarioLogado.uid)
          .collection('carrinho')
          .add({
        'titulo': produtoData['titulo'] ?? '',
        'autor': produtoData['autor'] ?? '',
        'categoria': produtoData['categoria'] ?? '',
        'preco': produtoData['preco'] ?? '',
        'urlImagem': produtoData['urlImagem'] ?? '',
        'adicionadoEm': FieldValue.serverTimestamp(),
      });

      if (context.mounted) {
        ScaffoldMessenger.of(context).showSnackBar(
          SnackBar(
            content: Text('"${produtoData['titulo']}" adicionado ao carrinho!'),
            backgroundColor: Colors.green,
          ),
        );
      }
    } catch (e) {
      if (context.mounted) {
        ScaffoldMessenger.of(context).showSnackBar(
          SnackBar(content: Text("Erro ao adicionar produto: $e"), backgroundColor: Colors.red),
        );
      }
    }
  }

  @override
  Widget build(BuildContext context) {
    final CollectionReference produtosRef = FirebaseFirestore.instance.collection('produtos');

    return Scaffold(
      appBar: AppBar(
        backgroundColor: Colors.orange[800],
        toolbarHeight: 90,
        title: const Column(
          crossAxisAlignment: CrossAxisAlignment.start,
          children: [
            Text("Livraria", style: TextStyle(color: Colors.white, fontSize: 24, fontWeight: FontWeight.bold)),
            Text("Página Virada", style: TextStyle(color: Colors.white70, fontSize: 14)),
          ],
        ),
      ),
      body: Column(
        children: [
          Container(
            height: 60,
            padding: const EdgeInsets.symmetric(vertical: 10),
            child: ListView(
              scrollDirection: Axis.horizontal,
              padding: const EdgeInsets.symmetric(horizontal: 15),
              children: [
                _buildCapsulaCategoria("Todos", ativo: true),
                _buildCapsulaCategoria("Ficção"),
                _buildCapsulaCategoria("Romance"),
                _buildCapsulaCategoria("Suspense"),
                _buildCapsulaCategoria("Biografia"),
              ],
            ),
          ),
          Expanded(
            child: StreamBuilder(
              stream: produtosRef.snapshots(),
              builder: (context, AsyncSnapshot<QuerySnapshot> streamSnapshot) {
                if (streamSnapshot.connectionState == ConnectionState.waiting) {
                  return const Center(child: CircularProgressIndicator());
                }
                if (!streamSnapshot.hasData || streamSnapshot.data!.docs.isEmpty) {
                  return const Center(child: Text("Nenhum livro disponível na vitrine."));
                }

                return ListView.builder(
                  padding: const EdgeInsets.all(15),
                  itemCount: streamSnapshot.data!.docs.length,
                  itemBuilder: (context, index) {
                    final doc = streamSnapshot.data!.docs[index];
                    final Map<String, dynamic> data = doc.data() as Map<String, dynamic>;
                    final String urlImagem = data.containsKey('urlImagem') ? doc['urlImagem'] : '';

                    return _buildCardLivro(
                      context: context,
                      titulo: data['titulo'] ?? '',
                      autor: data['autor'] ?? '',
                      categoria: data['categoria'] ?? '', 
                      preco: data['preco'] ?? '',
                      urlImagem: urlImagem,
                      onAddTap: () => _adicionarAoCarrinho(context, data),
                    );
                  },
                );
              },
            ),
          )
        ],
      ),
    );
  }

  Widget _buildCapsulaCategoria(String texto, {bool ativo = false}) {
    return Container(
      margin: const EdgeInsets.only(right: 10),
      padding: const EdgeInsets.symmetric(horizontal: 20, vertical: 8),
      decoration: BoxDecoration(
        color: ativo ? Colors.orange[800] : Colors.grey[200],
        borderRadius: BorderRadius.circular(20),
      ),
      child: Center(
        child: Text(
          texto,
          style: TextStyle(color: ativo ? Colors.white : Colors.black87, fontWeight: FontWeight.bold),
        ),
      ),
    );
  }

  Widget _buildCardLivro({
    required BuildContext context,
    required String titulo, 
    required String autor, 
    required String category, // Mantido como solicitado nos parâmetros requeridos do componente
    required String preco, 
    required String urlImagem,
    required VoidCallback onAddTap,
  }) {
    return Card(
      margin: const EdgeInsets.only(bottom: 15),
      shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(20)),
      elevation: 2,
      child: Padding(
        padding: const EdgeInsets.all(12),
        child: Row(
          children: [
            Container(
              width: 90,
              height: 110,
              decoration: BoxDecoration(
                color: Colors.grey[200],
                borderRadius: BorderRadius.circular(15),
              ),
              clipBehavior: Clip.antiAlias,
              child: urlImagem.isNotEmpty
                  ? Image.network(urlImagem, fit: BoxFit.cover, errorBuilder: (context, error, stackTrace) => const Icon(Icons.broken_image))
                  : const Icon(Icons.book, color: Colors.grey, size: 40),
            ),
            const SizedBox(width: 15),
            Expanded(
              child: Column(
                crossAxisAlignment: CrossAxisAlignment.start,
                children: [
                  Text(
                    titulo, 
                    style: const TextStyle(fontSize: 16, fontWeight: FontWeight.bold),
                    maxLines: 1,
                    overflow: TextOverflow.ellipsis,
                  ),
                  Text(autor, style: const TextStyle(color: Colors.grey, fontSize: 13)),
                  const SizedBox(height: 5),
                  Container(
                    padding: const EdgeInsets.symmetric(horizontal: 8, vertical: 3),
                    decoration: BoxDecoration(color: Colors.orange[50], borderRadius: BorderRadius.circular(5)),
                    child: Text(category, style: TextStyle(color: Colors.orange[800], fontSize: 11, fontWeight: FontWeight.bold)),
                  ),
                  const SizedBox(height: 8),
                  Row(
                    mainAxisAlignment: MainAxisAlignment.spaceBetween,
                    children: [
                      Text(preco, style: TextStyle(color: Colors.orange[800], fontSize: 16, fontWeight: FontWeight.bold)),
                      ElevatedButton(
                        onPressed: onAddTap,
                        style: ElevatedButton.styleFrom(
                          backgroundColor: Colors.orange[800],
                          shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(15)),
                          padding: const EdgeInsets.symmetric(horizontal: 20),
                        ),
                        child: const Text("Adicionar", style: TextStyle(color: Colors.white, fontSize: 12)),
                      )
                    ],
                  )
                ],
              ),
            )
          ],
        ),
      ),
    );
  }
}

class TelaCarrinho extends StatelessWidget {
  const TelaCarrinho({super.key});

  Future<void> _removerDoCarrinho(String docId) async {
    final uid = FirebaseAuth.instance.currentUser?.uid;
    if (uid != null) {
      await FirebaseFirestore.instance
          .collection('usuarios')
          .doc(uid)
          .collection('carrinho')
          .doc(docId)
          .delete();
    }
  }

  @override
  Widget build(BuildContext context) {
    final User? usuarioLogado = FirebaseAuth.instance.currentUser;

    if (usuarioLogado == null) {
      return const Scaffold(
        body: Center(child: Text("Faça login para ver seu carrinho.")),
      );
    }

    final CollectionReference carrinhoRef = FirebaseFirestore.instance
        .collection('usuarios')
        .doc(usuarioLogado.uid)
        .collection('carrinho');

    return Scaffold(
      appBar: AppBar(title: const Text("Carrinho", style: TextStyle(fontWeight: FontWeight.bold))),
      body: StreamBuilder(
        stream: carrinhoRef.snapshots(),
        builder: (context, AsyncSnapshot<QuerySnapshot> streamSnapshot) {
          if (streamSnapshot.connectionState == ConnectionState.waiting) {
            return const Center(child: CircularProgressIndicator());
          }

          if (!streamSnapshot.hasData || streamSnapshot.data!.docs.isEmpty) {
            return const Center(
              child: Column(
                mainAxisAlignment: MainAxisAlignment.center,
                children: [
                  Icon(Icons.shopping_cart_outlined, size: 80, color: Colors.black12),
                  SizedBox(height: 15),
                  Text("Seu carrinho está vazio", style: TextStyle(color: Colors.grey, fontSize: 16)),
                ],
              ),
            );
          }

          return ListView.builder(
            padding: const EdgeInsets.all(15),
            itemCount: streamSnapshot.data!.docs.length,
            itemBuilder: (context, index) {
              final doc = streamSnapshot.data!.docs[index];
              final String urlImagem = doc['urlImagem'] ?? '';

              return Card(
                margin: const EdgeInsets.only(bottom: 12),
                shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(15)),
                child: ListTile(
                  leading: Container(
                    width: 40,
                    height: 50,
                    decoration: BoxDecoration(
                      color: Colors.orange[100],
                      borderRadius: BorderRadius.circular(8),
                    ),
                    clipBehavior: Clip.antiAlias,
                    child: urlImagem.isNotEmpty
                        ? Image.network(urlImagem, fit: BoxFit.cover, errorBuilder: (context, error, stackTrace) => const Icon(Icons.broken_image))
                        : Icon(Icons.book, color: Colors.orange[800]),
                  ),
                  title: Text(doc['titulo'] ?? '', style: const TextStyle(fontWeight: FontWeight.bold)),
                  subtitle: Text(doc['preco'] ?? ''),
                  trailing: IconButton(
                    icon: const Icon(Icons.remove_circle_outline, color: Colors.red),
                    onPressed: () => _removerDoCarrinho(doc.id),
                  ),
                ),
              );
            },
          );
        },
      ),
    );
  }
}

class TelaGerenciarProdutos extends StatefulWidget {
  const TelaGerenciarProdutos({super.key});

  @override
  State<TelaGerenciarProdutos> createState() => _TelaGerenciarProdutosState();
}

class _TelaGerenciarProdutosState extends State<TelaGerenciarProdutos> {
  final CollectionReference _produtosRef = FirebaseFirestore.instance.collection('produtos');
  
  final _tituloController = TextEditingController();
  final _autorController = TextEditingController();
  final _precoController = TextEditingController();
  final _categoriaController = TextEditingController();

  Uint8List? _imagemBytes; 
  String _urlImagemExistente = '';
  bool _carregandoImagem = false;

  Future<void> _selecionarImagem() async {
    final ImagePicker picker = ImagePicker();
    final XFile? image = await picker.pickImage(source: ImageSource.gallery);
    if (image != null) {
      final bytes = await image.readAsBytes();
      setState(() {
        _imagemBytes = bytes;
      });
    }
  }

  Future<String> _uploadImagem(String nomeDoArquivo) async {
    if (_imagemBytes == null) return _urlImagemExistente;

    try {
      final ref = FirebaseStorage.instance.ref().child('capas_livros/$nomeDoArquivo.png');
      final metadata = SettableMetadata(contentType: 'image/png');
      
      UploadTask uploadTask = ref.putData(_imagemBytes!, metadata);
      TaskSnapshot snapshot = await uploadTask;
      return await snapshot.ref.getDownloadURL();
    } catch (e) {
      print("Erro ao fazer upload da imagem: $e");
      return '';
    }
  }

  void _abrirFormularioModal([DocumentSnapshot? docSnapshot]) {
    setState(() {
      _imagemBytes = null;
      _urlImagemExistente = '';
    });

    if (docSnapshot != null) {
      _tituloController.text = docSnapshot['titulo'] ?? '';
      _autorController.text = docSnapshot['autor'] ?? '';
      _precoController.text = docSnapshot['preco'] ?? '';
      _categoriaController.text = docSnapshot['categoria'] ?? '';
      
      final Map<String, dynamic>? data = docSnapshot.data() as Map<String, dynamic>?;
      if (data != null && data.containsKey('urlImagem')) {
        _urlImagemExistente = docSnapshot['urlImagem'];
      }
    } else {
      _tituloController.clear();
      _autorController.clear();
      _precoController.clear();
      _categoriaController.clear();
    }

    showModalBottomSheet(
      context: context,
      isScrollControlled: true,
      shape: const RoundedRectangleBorder(borderRadius: BorderRadius.vertical(top: Radius.circular(25))),
      builder: (context) => StatefulBuilder( 
        builder: (context, setModalState) {
          return Padding(
            padding: EdgeInsets.only(
              top: 20, left: 20, right: 20,
              bottom: MediaQuery.of(context).viewInsets.bottom + 20
            ),
            child: Column(
              mainAxisSize: MainAxisSize.min,
              crossAxisAlignment: CrossAxisAlignment.start,
              children: [
                Text(docSnapshot == null ? "Adicionar Livro" : "Editar Livro", 
                  style: const TextStyle(fontSize: 20, fontWeight: FontWeight.bold)),
                const SizedBox(height: 15),
                
                Center(
                  child: GestureDetector(
                    onTap: () async {
                      await _selecionarImagem();
                      setModalState(() {}); 
                    },
                    child: Container(
                      width: 100,
                      height: 130,
                      decoration: BoxDecoration(
                        color: Colors.grey[200],
                        borderRadius: BorderRadius.circular(15),
                        border: Border.all(color: Colors.orange),
                      ),
                      clipBehavior: Clip.antiAlias,
                      child: _imagemBytes != null
                          ? Image.memory(_imagemBytes!, fit: BoxFit.cover)
                          : (_urlImagemExistente.isNotEmpty 
                              ? Image.network(_urlImagemExistente, fit: BoxFit.cover)
                              : const Icon(Icons.add_a_photo, color: Colors.orange, size: 40)),
                    ),
                  ),
                ),
                const SizedBox(height: 10),
                
                TextField(controller: _tituloController, decoration: const InputDecoration(labelText: "Título")),
                TextField(controller: _autorController, decoration: const InputDecoration(labelText: "Autor")),
                TextField(controller: _categoriaController, decoration: const InputDecoration(labelText: "Categoria")),
                TextField(controller: _precoController, decoration: const InputDecoration(labelText: "Preço (ex: R\$ 49.90)")),
                const SizedBox(height: 20),
                
                ElevatedButton(
                  style: ElevatedButton.styleFrom(
                    backgroundColor: Colors.orange[800],
                    minimumSize: const Size(double.infinity, 50),
                    shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(15)),
                  ),
                  onPressed: _carregandoImagem ? null : () async {
                    setModalState(() => _carregandoImagem = true);

                    final String idUnico = docSnapshot?.id ?? DateTime.now().millisecondsSinceEpoch.toString();
                    final String urlDaFoto = await _uploadImagem(idUnico);

                    final dados = {
                      'titulo': _tituloController.text,
                      'autor': _autorController.text,
                      'categoria': _categoriaController.text,
                      'preco': _precoController.text,
                      'urlImagem': urlDaFoto, 
                    };

                    try {
                      if (docSnapshot == null) {
                        await _produtosRef.add(dados);
                      } else {
                        await _produtosRef.doc(docSnapshot.id).update(dados);
                      }
                      setModalState(() => _carregandoImagem = false);
                      if (context.mounted) Navigator.pop(context);
                    } catch (e) {
                      setModalState(() => _carregandoImagem = false);
                      print("Erro ao salvar: $e");
                    }
                  },
                  child: _carregandoImagem 
                      ? const SizedBox(
                          height: 20, 
                          width: 20, 
                          child: CircularProgressIndicator(color: Colors.white, strokeWidth: 2)
                        )
                      : Text(docSnapshot == null ? "Cadastrar" : "Salvar Alterações", style: const TextStyle(color: Colors.white)),
                )
              ],
            ),
          );
        }
      ),
    );
  }

  void _deletarProduto(String id) async {
    await _produtosRef.doc(id).delete();
    if (mounted) {
      ScaffoldMessenger.of(context).showSnackBar(
        const SnackBar(content: Text("Produto excluído com sucesso!"))
      );
    }
  }

  @override
  Widget build(BuildContext context) {
    return Scaffold(
      appBar: AppBar(
        title: const Text("Gerenciar Produtos", style: TextStyle(fontWeight: FontWeight.bold)),
      ),
      floatingActionButton: FloatingActionButton(
        backgroundColor: Colors.orange[800],
        onPressed: () => _abrirFormularioModal(),
        child: const Icon(Icons.add, color: Colors.white),
      ),
      body: StreamBuilder(
        stream: _produtosRef.snapshots(),
        builder: (context, AsyncSnapshot<QuerySnapshot> streamSnapshot) {
          if (streamSnapshot.connectionState == ConnectionState.waiting) {
            return const Center(child: CircularProgressIndicator());
          }
          if (!streamSnapshot.hasData || streamSnapshot.data!.docs.isEmpty) {
            return const Center(
              child: Column(
                mainAxisAlignment: MainAxisAlignment.center,
                children: [
                  Icon(Icons.backpack_outlined, size: 80, color: Colors.black12),
                  SizedBox(height: 15),
                  Text("Nenhum produto cadastrado", style: TextStyle(color: Colors.grey, fontSize: 16)),
                ],
              ),
            );
          }

          return ListView.builder(
            padding: const EdgeInsets.all(15),
            itemCount: streamSnapshot.data!.docs.length,
            itemBuilder: (context, index) {
              final DocumentSnapshot documentSnapshot = streamSnapshot.data!.docs[index];
              final Map<String, dynamic>? data = documentSnapshot.data() as Map<String, dynamic>?;
              final String urlImagem = (data != null && data.containsKey('urlImagem')) ? documentSnapshot['urlImagem'] : '';

              return Card(
                margin: const EdgeInsets.only(bottom: 12),
                shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(15)),
                child: ListTile(
                  leading: Container(
                    width: 40,
                    height: 50,
                    decoration: BoxDecoration(
                      color: Colors.orange[100],
                      borderRadius: BorderRadius.circular(8),
                    ),
                    clipBehavior: Clip.antiAlias,
                    child: urlImagem.isNotEmpty
                        ? Image.network(urlImagem, fit: BoxFit.cover, errorBuilder: (context, error, stackTrace) => const Icon(Icons.broken_image))
                        : Icon(Icons.book, color: Colors.orange[800]),
                  ),
                  title: Text(documentSnapshot['titulo'] ?? '', style: const TextStyle(fontWeight: FontWeight.bold)),
                  subtitle: Text("${documentSnapshot['autor'] ?? ''} | ${documentSnapshot['preco'] ?? ''}"),
                  trailing: Row(
                    mainAxisSize: MainAxisSize.min,
                    children: [
                      IconButton(
                        icon: const Icon(Icons.edit, color: Colors.blue),
                        onPressed: () => _abrirFormularioModal(documentSnapshot),
                      ),
                      IconButton(
                        icon: const Icon(Icons.delete, color: Colors.red),
                        onPressed: () => _deletarProduto(documentSnapshot.id),
                      ),
                    ],
                  ),
                ),
              );
            },
          );
        },
      ),
    );
  }
}
